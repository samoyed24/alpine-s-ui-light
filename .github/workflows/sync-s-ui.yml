name: Sync s-ui binaries

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check latest s-ui release
        id: check
        run: |
          LATEST=$(curl -s https://api.github.com/repos/alireza0/s-ui/releases/latest | jq -r '.tag_name')

          if [ -z "$LATEST" ] || [ "$LATEST" = "null" ]; then
            echo "Failed to fetch latest release tag"
            exit 1
          fi

          # Check our current release
          CURRENT=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/releases/latest 2>/dev/null | jq -r '.tag_name // "none"')

          echo "latest=$LATEST" >> $GITHUB_OUTPUT
          echo "current=$CURRENT" >> $GITHUB_OUTPUT

          if [ "$CURRENT" = "$LATEST" ]; then
            echo "needs_update=false" >> $GITHUB_OUTPUT
            echo "::notice::Already up to date ($LATEST)"
          else
            echo "needs_update=true" >> $GITHUB_OUTPUT
            echo "::notice::Update available: $LATEST (current: $CURRENT)"
          fi

      - name: Download s-ui binaries
        if: steps.check.outputs.needs_update == 'true'
        run: |
          mkdir -p /tmp/s-ui
          cd /tmp/s-ui

          echo "Downloading amd64..."
          curl -sL "https://github.com/alireza0/s-ui/releases/download/${{ steps.check.outputs.latest }}/s-ui-linux-amd64.tar.gz" -o s-ui-linux-amd64.tar.gz

          echo "Downloading arm64..."
          curl -sL "https://github.com/alireza0/s-ui/releases/download/${{ steps.check.outputs.latest }}/s-ui-linux-arm64.tar.gz" -o s-ui-linux-arm64.tar.gz

          ls -lh

      - name: Create GitHub Release
        if: steps.check.outputs.needs_update == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd /tmp/s-ui

          # Delete existing release if it exists (for re-runs)
          gh release delete ${{ steps.check.outputs.latest }} --repo ${{ github.repository }} --yes 2>/dev/null || true

          # Create new release with assets
          gh release create ${{ steps.check.outputs.latest }} \
            --repo ${{ github.repository }} \
            --title "s-ui ${{ steps.check.outputs.latest }}" \
            --notes "Synced from alireza0/s-ui ${{ steps.check.outputs.latest }}" \
            s-ui-linux-amd64.tar.gz \
            s-ui-linux-arm64.tar.gz

          echo "Release created: ${{ steps.check.outputs.latest }}"
