name: Sync s-ui binaries

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check latest s-ui release
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST=$(gh release view --repo alireza0/s-ui --json tagName --jq '.tagName')

          if [ -z "$LATEST" ] || [ "$LATEST" = "null" ]; then
            echo "Failed to fetch latest release tag"
            exit 1
          fi

          # Check our current release
          CURRENT=$(gh release view --repo ${{ github.repository }} --json tagName --jq '.tagName' 2>/dev/null || echo "none")

          echo "latest=$LATEST" >> $GITHUB_OUTPUT
          echo "current=$CURRENT" >> $GITHUB_OUTPUT

          if [ "$CURRENT" = "$LATEST" ]; then
            echo "needs_update=false" >> $GITHUB_OUTPUT
            echo "::notice::Already up to date ($LATEST)"
          else
            echo "needs_update=true" >> $GITHUB_OUTPUT
            echo "::notice::Update available: $LATEST (current: $CURRENT)"
          fi

      - name: Download and extract s-ui binaries
        if: steps.check.outputs.needs_update == 'true'
        run: |
          mkdir -p /tmp/s-ui-release
          cd /tmp/s-ui-release

          # Download and extract amd64
          echo "Downloading and extracting amd64..."
          mkdir -p /tmp/extract-amd64
          curl -sL "https://github.com/alireza0/s-ui/releases/download/${{ steps.check.outputs.latest }}/s-ui-linux-amd64.tar.gz" | tar xz -C /tmp/extract-amd64 --strip-components=1

          # Rename files with arch prefix to avoid conflicts
          mv /tmp/extract-amd64/sui sui-amd64
          mv /tmp/extract-amd64/s-ui.sh s-ui-amd64.sh
          mv /tmp/extract-amd64/s-ui.service s-ui-amd64.service
          echo "${{ steps.check.outputs.latest }}" > version-amd64.txt

          # Download and extract arm64
          echo "Downloading and extracting arm64..."
          mkdir -p /tmp/extract-arm64
          curl -sL "https://github.com/alireza0/s-ui/releases/download/${{ steps.check.outputs.latest }}/s-ui-linux-arm64.tar.gz" | tar xz -C /tmp/extract-arm64 --strip-components=1

          mv /tmp/extract-arm64/sui sui-arm64
          mv /tmp/extract-arm64/s-ui.sh s-ui-arm64.sh
          mv /tmp/extract-arm64/s-ui.service s-ui-arm64.service
          echo "${{ steps.check.outputs.latest }}" > version-arm64.txt

          echo "Files to upload:"
          ls -lh

      - name: Create GitHub Release
        if: steps.check.outputs.needs_update == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd /tmp/s-ui-release

          # Delete existing release if it exists (for re-runs)
          gh release delete ${{ steps.check.outputs.latest }} --repo ${{ github.repository }} --yes 2>/dev/null || true

          # Create new release with all files
          gh release create ${{ steps.check.outputs.latest }} \
            --repo ${{ github.repository }} \
            --title "s-ui ${{ steps.check.outputs.latest }}" \
            --notes "Synced from alireza0/s-ui ${{ steps.check.outputs.latest }} (pre-extracted)" \
            sui-amd64 \
            sui-arm64 \
            s-ui-amd64.sh \
            s-ui-arm64.sh \
            s-ui-amd64.service \
            s-ui-arm64.service \
            version-amd64.txt \
            version-arm64.txt

          echo "Release created: ${{ steps.check.outputs.latest }}"
