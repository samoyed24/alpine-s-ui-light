name: Sync s-ui binaries

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check latest s-ui release
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST=$(gh release view --repo alireza0/s-ui --json tagName --jq '.tagName')

          if [ -z "$LATEST" ] || [ "$LATEST" = "null" ]; then
            echo "Failed to fetch latest release tag"
            exit 1
          fi

          # Check our current release
          CURRENT=$(gh release view --repo ${{ github.repository }} --json tagName --jq '.tagName' 2>/dev/null || echo "none")

          echo "latest=$LATEST" >> $GITHUB_OUTPUT
          echo "current=$CURRENT" >> $GITHUB_OUTPUT

          if [ "$CURRENT" = "$LATEST" ]; then
            echo "needs_update=false" >> $GITHUB_OUTPUT
            echo "::notice::Already up to date ($LATEST)"
          else
            echo "needs_update=true" >> $GITHUB_OUTPUT
            echo "::notice::Update available: $LATEST (current: $CURRENT)"
          fi

      - name: Download and extract s-ui binaries
        if: steps.check.outputs.needs_update == 'true'
        run: |
          mkdir -p /tmp/s-ui-extracted
          cd /tmp/s-ui-extracted

          # Download and extract amd64
          echo "Downloading and extracting amd64..."
          curl -sL "https://github.com/alireza0/s-ui/releases/download/${{ steps.check.outputs.latest }}/s-ui-linux-amd64.tar.gz" | tar xz --strip-components=1
          mkdir -p amd64
          mv sui s-ui.sh s-ui.service amd64/ 2>/dev/null || true
          echo "${{ steps.check.outputs.latest }}" > amd64/version.txt

          # Clean up for arm64
          rm -f sui s-ui.sh s-ui.service

          # Download and extract arm64
          echo "Downloading and extracting arm64..."
          curl -sL "https://github.com/alireza0/s-ui/releases/download/${{ steps.check.outputs.latest }}/s-ui-linux-arm64.tar.gz" | tar xz --strip-components=1
          mkdir -p arm64
          mv sui s-ui.sh s-ui.service arm64/ 2>/dev/null || true
          echo "${{ steps.check.outputs.latest }}" > arm64/version.txt

          echo "Extracted files:"
          find . -type f -exec ls -lh {} \;

      - name: Create GitHub Release
        if: steps.check.outputs.needs_update == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd /tmp/s-ui-extracted

          # Delete existing release if it exists (for re-runs)
          gh release delete ${{ steps.check.outputs.latest }} --repo ${{ github.repository }} --yes 2>/dev/null || true

          # Create new release with all extracted files
          gh release create ${{ steps.check.outputs.latest }} \
            --repo ${{ github.repository }} \
            --title "s-ui ${{ steps.check.outputs.latest }}" \
            --notes "Synced from alireza0/s-ui ${{ steps.check.outputs.latest }} (pre-extracted)" \
            amd64/* \
            arm64/*

          echo "Release created: ${{ steps.check.outputs.latest }}"
          echo "Files uploaded:"
          ls -lh amd64/ arm64/
